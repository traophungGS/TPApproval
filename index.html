<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trao Phung Approval Rating</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1>Approval Rating Polls</h1>
            </div>
            <div class="navbar-menu">
                <a href="#" class="nav-link active" data-tab="polls">Polls</a>
                <a href="#" class="nav-link" data-tab="stats">Statistics</a>
                <a href="https://discord.gg/fnDYaTEzSt" target="_blank" class="nav-link" style="color: #5865f2; font-weight: 600;">
                    Join Discord 🔗
                </a>
            </div>
        </div>
    </nav>

    <main class="container">
        <!-- Polls Tab -->
        <section id="pollsTab" class="tab-content active">
            <div class="section-header">
                <h2>Today's Polls</h2>
                <p class="poll-date" id="pollDate"></p>
            </div>

            <div id="pollsContainer" class="polls-grid">
                <p style="text-align: center; color: #666;">Loading polls...</p>
            </div>
        </section>

        <!-- Statistics Tab -->
        <section id="statsTab" class="tab-content">
            <div class="section-header">
                <h2>Historical Statistics</h2>
                <div class="stats-controls">
                    <select id="pollSelect" class="date-input">
                        <option value="">Select a poll...</option>
                    </select>
                    <input type="date" id="startDate" class="date-input">
                    <span>to</span>
                    <input type="date" id="endDate" class="date-input">
                    <button id="filterBtn" class="btn btn-primary">View Chart</button>
                </div>
            </div>

            <div id="statsContent">
                <div style="text-align: center; color: #99aab5; padding: 2rem;">
                    Select a poll and date range to view historical data
                </div>
            </div>
        </section>
    </main>

    <canvas id="statsChart" style="display: none;"></canvas>

    <script src="app.js"></script>
</body>
</html>
