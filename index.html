<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trao Phung Approval Rating</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <h1>Trao Phung Approval Rating</h1>
            </div>
            <div class="navbar-menu">
                <a href="#" class="nav-link active" data-tab="polls">Daily Poll</a>
                <a href="#" class="nav-link" data-tab="stats">Statistics</a>
                <a href="#" class="nav-link" data-tab="archive">Archive</a>
                <div id="userInfo" class="user-info" style="display: none;">
                    <img id="userAvatar" src="" alt="User Avatar" class="user-avatar">
                    <span id="username"></span>
                    <button id="logoutBtn" class="logout-btn">Logout</button>
                </div>
                <button id="loginBtn" class="login-btn" style="display: none;">
                    Login with Discord
                </button>
            </div>
        </div>
    </nav>

    <main class="container">
        <!-- Daily Poll Tab -->
        <section id="pollsTab" class="tab-content active">
            <div class="section-header">
                <h2>Today's Approval Rating</h2>
                <p id="pollDate" class="poll-date"></p>
            </div>

            <div id="pollContent" class="poll-container">
                <p style="text-align: center; color: #666;">Loading poll...</p>
            </div>
        </section>

        <!-- Statistics Tab -->
        <section id="statsTab" class="tab-content">
            <div class="section-header">
                <h2>Statistics</h2>
                <div class="stats-controls">
                    <input type="date" id="startDate" class="date-input">
                    <span>to</span>
                    <input type="date" id="endDate" class="date-input">
                    <button id="filterBtn" class="btn btn-primary">Filter</button>
                </div>
            </div>

            <div id="statsContent" class="stats-container">
                <p style="text-align: center; color: #666;">Loading statistics...</p>
            </div>
        </section>

        <!-- Archive Tab -->
        <section id="archiveTab" class="tab-content">
            <div class="section-header">
                <h2>Archived Polls</h2>
            </div>

            <div id="archiveContent" class="archive-container">
                <p style="text-align: center; color: #666;">Loading archived polls...</p>
            </div>
        </section>
    </main>

    <!-- Login Modal -->
    <div id="loginModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Login Required</h2>
            <p>You must login with Discord to vote.</p>
            <button id="discordLoginBtn" class="btn btn-primary btn-large">
                Login with Discord
            </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
